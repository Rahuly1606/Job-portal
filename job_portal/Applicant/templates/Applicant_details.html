{% extends "header_m.html" %}

{% block body %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Additional Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            /*background: white;*/
            padding: 30px;
            border-radius: 10px;
            /*box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.1);*/
        }
         ::-webkit-scrollbar {
    width: 12px; /* Set the width of the scrollbar */
}

::-webkit-scrollbar-track {
    background-color: #f1f1f1; /* Set the background color of the scrollbar track */
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background-color: #8e7575; /* Set the color of the scrollbar thumb */
    border-radius: 10px; /* Round the corners of the scrollbar thumb */
    border: 3px solid #f1f1f1; /* Add space between thumb and track */
}

::-webkit-scrollbar-thumb:hover {
    background-color: #6b5a5a; /* Change color on hover */
}

::-webkit-scrollbar-button {
    display: none; /* Hide the scrollbar buttons */
}
        .form-control:focus {
            box-shadow: 0px 0px 8px rgba(0, 123, 255, 0.5);
        }
        .btn-submit {
            background-color: #6c757d; /* Default grey */
            color: white;
            transition: background-color 0.3s ease;
        }
        .btn-submit.active {
            background-color: #28a745; /* Green */
        }
        .update-btn {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
        }
        .update-btn:hover {
            text-decoration: none;
        }
        @media (max-width: 500px) {
        .form-label {
            font-size: 14px;
        }
        .row > div {
            margin-bottom: 15px;
        }
    }
    </style>
</head>
<body>
    <div class="container">
    <h3 class="text-center mb-4"> Your Profile</h3>
    <form method="POST">
        {% csrf_token %}

        <!-- Personal Information -->
        <h5>Personal Information</h5>
        <div class="row">
            <!-- Username -->
<div class="col-md-6 col-12 mb-3">
    <label for="username" class="form-label">
        Username
    </label>
    <input type="text" class="form-control" id="username" name="username"
        value="{{ applicant.username }}" disabled>
</div>

<!-- Email -->
<div class="col-md-6 col-12 mb-3">
    <label for="email" class="form-label">
        Email
    </label>
    <input type="email" class="form-control" id="email" name="email"
        value="{{ applicant.email }}" disabled>
</div>

            <div class="col-md-6 col-12 mb-3">
                <label for="phone_number" class="form-label">
                    Phone Number
                    <span class="update-btn" onclick="enableField('phone_number')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="text" class="form-control" id="phone_number" name="phone_number"
                    value="{{ applicant_detail.phone_number }}" disabled>
            </div>
            <div class="col-md-6 col-12 mb-3">
                <label for="address" class="form-label">
                    Address
                    <span class="update-btn" onclick="enableField('address')"><i class="fas fa-edit icon"></i></span>
                </label>
                <textarea class="form-control" id="address" name="address" rows="2" disabled>{{ applicant_detail.address }}</textarea>
            </div>
        </div>

        <!-- Professional Details -->
        <h5>Professional Details</h5>
        <div class="row">
            <div class="col-md-6 col-12 mb-3">
                <label for="current_job_title" class="form-label">
                    Current Job Title
                    <span class="update-btn" onclick="enableField('current_job_title')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="text" class="form-control" id="current_job_title" name="current_job_title"
                    value="{{ applicant_detail.current_job_title }}" disabled>
            </div>
            <div class="col-md-6 col-12 mb-3">
                <label for="company_name" class="form-label">
                    Company Name
                    <span class="update-btn" onclick="enableField('company_name')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="text" class="form-control" id="company_name" name="company_name"
                    value="{{ applicant_detail.company_name }}" disabled>
            </div>
        </div>

        <!-- Education -->
        <h5>Education</h5>
        <div class="row">
            <div class="col-md-6 col-12 mb-3">
                <label for="institution" class="form-label">
                    institution
                    <span class="update-btn" onclick="enableField('institution')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="text" class="form-control" id="institution" name="institution"
                    value="{{ applicant_detail.institution }}" disabled>
            </div>
            <div class="col-md-6 col-12 mb-3">
                <label for="degree" class="form-label">
                    Degree
                    <span class="update-btn" onclick="enableField('degree')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="text" class="form-control" id="degree" name="degree"
                    value="{{ applicant_detail.degree }}" disabled>
            </div>
            <div class="col-md-6 col-12 mb-3">
                <label for="graduation_date" class="form-label">
                    Graduation Date
                    <span class="update-btn" onclick="enableField('graduation_date')"><i class="fas fa-edit icon"></i></span>
                </label>
                <input type="date" class="form-control" id="graduation_date" name="graduation_date"
                    value="{{ applicant_detail.graduation_date }}" disabled>
            </div>
        </div>

        <!-- Languages Known -->
        <h5>Languages Known</h5>
        <div class="mb-3">
            <label for="languages_known" class="form-label">
                Languages Known
                <span class="update-btn" onclick="enableField('languages_known')"><i class="fas fa-edit icon"></i></span>
            </label>
            <input type="text" class="form-control" id="languages_known" name="languages_known"
                value="{{ applicant_detail.languages_known }}" disabled>
        </div>

        <!-- Confirmation -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="confirm" name="confirm" required>
            <label class="form-check-label" for="confirm">I confirm that the details provided are accurate.</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-submit w-100">Submit Details</button>
    </form>
</div>

    <script>
        function enableField(fieldId) {
            const field = document.getElementById(fieldId);
            field.disabled = false; // Enable the field
            field.focus(); // Focus on the field for immediate editing
            document.querySelector('.btn-submit').classList.add('active'); // Change the submit button state
        }
    </script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById("offcanvas");
        sidebar.classList.toggle("active");
    }
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
